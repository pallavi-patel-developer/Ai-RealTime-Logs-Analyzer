services:
  - type: web
    name: ai-log-analyzer
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 4
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: CLINIC_EMAIL
        sync: false
      - key: WEB_CONCURRENCY # Render sets this, but we can override
        value: 2
